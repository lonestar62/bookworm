<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookworm</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    /* Login-specific extras */
    .login-body {
      background: linear-gradient(160deg, #fdf6e9 0%, #f0ddb5 100%);
    }
    .login-card {
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '📚';
      position: absolute;
      top: -20px;
      right: -20px;
      font-size: 8rem;
      opacity: 0.06;
      transform: rotate(15deg);
      pointer-events: none;
    }
    .error-msg {
      background: #fdf0ef;
      border: 2px solid #c0392b;
      border-radius: 10px;
      color: #c0392b;
      font-size: 1.05rem;
      font-weight: 600;
      padding: 16px 20px;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body class="login-body">
  <div class="login-page">
    <div class="login-card">
      <span class="login-emoji">📚</span>
      <h1 class="login-title">Bookworm</h1>
      <p class="login-subtitle">Welcome, Jean!<br>Type your email to sign in.</p>

      <div id="error-msg" class="error-msg" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Your Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            autocapitalize="none"
            spellcheck="false"
            placeholder="jean@whiddon.net"
            aria-describedby="error-msg"
          >
        </div>
        <button type="submit" class="btn btn-primary login-btn" id="signin-btn">
          Sign In →
        </button>
      </form>
    </div>
  </div>

  <script>
    // If already logged in, go straight to app
    fetch('/auth/status').then(r => r.json()).then(data => {
      if (data.loggedIn) window.location.href = '/app';
    });

    const form = document.getElementById('login-form');
    const emailInput = document.getElementById('email');
    const errorEl = document.getElementById('error-msg');
    const signinBtn = document.getElementById('signin-btn');

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }
    function hideError() {
      errorEl.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();
      const email = emailInput.value.trim();
      if (!email) {
        showError('Please enter your email address.');
        emailInput.focus();
        return;
      }
      signinBtn.disabled = true;
      signinBtn.textContent = 'Signing in…';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = '/app';
        } else {
          showError(data.error || 'Something went wrong. Please try again.');
          signinBtn.disabled = false;
          signinBtn.textContent = 'Sign In →';
          emailInput.focus();
        }
      } catch {
        showError('Could not connect. Please check your internet and try again.');
        signinBtn.disabled = false;
        signinBtn.textContent = 'Sign In →';
      }
    });
  </script>
</body>
</html>
